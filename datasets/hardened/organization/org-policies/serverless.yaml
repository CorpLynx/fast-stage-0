---
# sample subset of useful organization policies, edit to suit requirements
# start of document (---) avoids errors if the file only contains comments

# yaml-language-server: $schema=../../../../schemas/org-policies.schema.json

cloudfunctions.allowedIngressSettings:
  rules:
    - allow:
        values:
          - "ALLOW_INTERNAL_AND_GCLB"

cloudfunctions.allowedVpcConnectorEgressSettings:
  rules:
    - allow:
        values:
          - "ALL_TRAFFIC"

cloudfunctions.requireVPCConnector:
  rules:
    - enforce: true

custom.cloudrunDisableEnvironmentVariablePatternV4:
  rules:
    - enforce: true

custom.cloudrunJobDisableDefaultServiceAccountV4:
  rules:
    - enforce: true

custom.cloudrunJobRequireBinaryAuthorizationV4:
  rules:
    - enforce: true

custom.cloudrunServiceDisableDefaultServiceAccountV4:
  rules:
    - enforce: true

custom.cloudrunServiceRequireBinaryAuthorizationV4:
  rules:
    - enforce: true

run.allowedBinaryAuthorizationPolicies:
  rules:
    - allow:
        values:
          - "default"

run.allowedIngress:
  rules:
    - allow:
        values:
          - "is:internal-and-cloud-load-balancing"

run.allowedVPCEgress:
  rules:
    - allow:
        values:
          - "all-traffic"

run.managed.requireInvokerIam:
  rules:
    - enforce: true
