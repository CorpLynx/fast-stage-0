# Terraform will puke if you try to have it parse an empty yaml file
---
easy-vm:
  container_image: "us-docker.pkg.dev/cloudrun/container/hello"
  members:
    - group:easy@${DOMAIN}
  subdomain: easy-vm
  condition:
    title: Lenient Device Level
    description: "Group based + US"
    expression: "\"accessPolicies/${ACCESSPOLICY}/accessLevels/lenient_device\" in request.auth.access_levels"
